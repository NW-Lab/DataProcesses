name: Bug report
description: Report reproducible incorrect behavior in DataProcesses
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Do not include secrets, personal data, health data, or undisclosed vulnerabilities. Security issues belong in the private process described in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release tag or commit SHA where the problem occurs.
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide numbered steps and a minimal flow or sample when possible. Use synthetic data only.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed secrets and personal or sensitive data.
          required: true
        - label: This is not a privately reportable security vulnerability.
          required: true
